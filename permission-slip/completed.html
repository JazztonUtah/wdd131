<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Permission Slip Submitted</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Outfit:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      .confirmation {
        max-width: 36rem;
        margin: 4rem auto;
        padding: 2rem;
        text-align: center;
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 2px 8px var(--shadow);
      }

      .confirmation h1 {
        font-family: "Cormorant Garamond", serif;
        margin-bottom: 1rem;
      }

      .confirmation p {
        color: var(--text-light);
        margin-bottom: 1.5rem;
      }

      .confirmation a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="confirmation">
      <h1>Thank you</h1>
      <p id="confirmationMessage"></p>
      <p>
        <a href="index.html">Submit another form</a>
        &nbsp;·&nbsp;
        <a href="../East Bench/index.html">Back to East Bench Chapel</a>
      </p>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const message = document.getElementById("confirmationMessage");

      if (params.get("method") === "text") {
        if (params.get("cancelled") === "1") {
          message.textContent =
            "Sharing was cancelled. You can submit again to text the PDF, or choose Download PDF.";
        } else {
          message.textContent =
            "Your permission slip was shared. If you picked Messages, choose your contact and send the PDF.";
        }
      } else {
        message.textContent =
          "Your permission slip PDF has been downloaded using the official form layout. Give a copy to your activity leader.";
      }
    </script>
  </body>
</html>
