<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Permission Slip Submitted</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Outfit:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      .confirmation {
        max-width: 36rem;
        margin: 4rem auto;
        padding: 2rem;
        text-align: center;
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 2px 8px var(--shadow);
      }

      .confirmation h1 {
        font-family: "Cormorant Garamond", serif;
        margin-bottom: 1rem;
      }

      .confirmation p {
        color: var(--text-light);
        margin-bottom: 1rem;
      }

      .confirmation a {
        color: var(--accent);
      }

      .email-steps {
        text-align: left;
        font-size: 0.95rem;
        margin: 1rem 0 1.25rem;
        padding-left: 1.25rem;
      }

      .email-steps li {
        margin-bottom: 0.35rem;
      }

      .btn-open-email {
        display: inline-block;
        margin-bottom: 1.25rem;
        padding: 0.7rem 1.25rem;
        background: var(--accent);
        color: var(--white);
        text-decoration: none;
        border-radius: 6px;
        font-weight: 500;
      }

      .btn-open-email:hover {
        background: #5a6b3d;
      }
    </style>
  </head>
  <body>
    <main class="confirmation">
      <h1>Thank you</h1>
      <p id="confirmationMessage"></p>
      <ol id="emailSteps" class="email-steps" hidden>
        <li>Find the PDF in your Downloads folder.</li>
        <li>Attach it to the email to <strong>santaquin10thward@gmail.com</strong>.</li>
        <li>Click Send in your email app.</li>
      </ol>
      <a id="openEmailBtn" class="btn-open-email" href="#" hidden>
        Open email to ward
      </a>
      <p>
        <a href="index.html">Submit another form</a>
        &nbsp;·&nbsp;
        <a href="../East Bench/index.html">Back to East Bench Chapel</a>
      </p>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const message = document.getElementById("confirmationMessage");
      const emailSteps = document.getElementById("emailSteps");
      const openEmailBtn = document.getElementById("openEmailBtn");

      if (params.get("method") === "text") {
        if (params.get("cancelled") === "1") {
          message.textContent =
            "Sharing was cancelled. You can submit again and choose Text, or use Download or Email.";
        } else {
          message.textContent =
            "Your permission slip was shared. If you picked Messages, choose your contact and send the PDF.";
        }
      } else if (params.get("method") === "email") {
        message.textContent =
          "Your permission slip PDF has been downloaded. Open your email app, attach the PDF, and send it to the ward.";
        emailSteps.hidden = false;
        openEmailBtn.hidden = false;

        const raw = sessionStorage.getItem("pendingMailto");
        if (raw) {
          const { to, subject, body } = JSON.parse(raw);
          sessionStorage.removeItem("pendingMailto");
          const mailto = `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
          openEmailBtn.href = mailto;
          window.location.href = mailto;
        }
      } else {
        message.textContent =
          "Your permission slip PDF has been downloaded using the official form layout. Give a copy to your activity leader.";
      }
    </script>
  </body>
</html>
